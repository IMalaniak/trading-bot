syntax = "proto3";

package tradingbot.portfolio_manager;

import "common/instrument.proto";
import "common/portfolio.proto";

service RiskAndPortfolioManager {
  rpc RegisterPortfolioInstrument (RegisterPortfolioInstrumentRequest) returns (RegisterPortfolioInstrumentResponse);
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc ListInstruments(ListInstrumentsRequest) returns (ListInstrumentsResponse);
}

message RegisterPortfolioInstrumentRequest {
  string portfolio_id = 1;
  tradingbot.common.AssetClass asset_class = 2;
  string symbol = 3;
  string venue = 4;
  string external_symbol = 5; // optional
  bool enabled = 6;
  string target_notional = 7;
  string max_trade_notional = 8;
  string max_position_notional = 9;
}

message RegisterPortfolioInstrumentResponse {
  tradingbot.common.PortfolioInstrumentConfig configured_instrument = 1;
}

message ListPortfoliosRequest {}

message ListPortfoliosResponse {
  repeated tradingbot.common.PortfolioSummary portfolios = 1;
}

message GetPortfolioRequest {
  string portfolio_id = 1;
}

message GetPortfolioResponse {
  tradingbot.common.PortfolioSummary summary = 1;
  repeated tradingbot.common.Position positions = 2;
  repeated tradingbot.common.PortfolioInstrumentConfig configured_instruments = 3;
}

message ListInstrumentsRequest {
  repeated string instrument_ids = 1;
}

message ListInstrumentsResponse {
  repeated tradingbot.common.Instrument instruments = 1;
}
