name: "CI — PR"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # Cancel older runs for the same PR; push and PR runs are separated by different workflows
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      base: ${{ steps.vars.outputs.base }}
      head: ${{ steps.vars.outputs.head }}
      run_all: ${{ steps.detect.outputs.run_all }}
      run_all_rust: ${{ steps.detect.outputs.run_all_rust }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Determine base and head shas
        id: vars
        run: |
          # Prefer SHAs when available, otherwise fall back to remote branch ref (origin/<base_ref>)
          if [ "${{ github.event.pull_request.base.sha }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          else
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
            git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1 || true
          fi
          # For HEAD, prefer the PR head sha; fallback to head ref if needed
          if [ "${{ github.event.pull_request.head.sha }}" != "0000000000000000000000000000000000000000" ]; then
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "head=origin/${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            git fetch origin ${{ github.event.pull_request.head.ref }} --depth=1 || true
          fi

      - name: Detect package/lockfile changes
        id: detect
        env:
          BASE: ${{ steps.vars.outputs.base }}
          HEAD: ${{ steps.vars.outputs.head }}
        run: |
          changed_files=$(git diff --name-only "$BASE" "$HEAD" || true)
          echo "Changed files:\n$changed_files"
          if echo "$changed_files" | grep -E '(^|/)package(-lock)?\.json$|.nvmrc|(^|/)pyproject\.toml$|(^|/)uv\.lock$|(^|/)uv\.toml$' >/dev/null; then
            echo "run_all=true" >> $GITHUB_OUTPUT
          else
            echo "run_all=false" >> $GITHUB_OUTPUT
          fi
          if echo "$changed_files" | grep -E '(^|/)(Cargo\.lock|Cargo\.toml)$' >/dev/null; then
            echo "run_all_rust=true" >> $GITHUB_OUTPUT
          else
            echo "run_all_rust=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: "Lint (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != '' # ensure prepare completed (even if false)
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Lint"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=lint --all --parallel

      - name: "Affected: Lint"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=lint --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lint-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  typecheck:
    name: "Typecheck (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: "Full Run: Typecheck"
        if: needs.prepare.outputs.run_all == 'true'
        run: npx nx run-many --target=typecheck --all --parallel --outputStyle=static

      - name: "Affected: Typecheck"
        if: needs.prepare.outputs.run_all != 'true'
        run: npx nx affected --target=typecheck --base=$BASE --head=$HEAD --parallel --outputStyle=static

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: typecheck-logs
          path: |
            .nx/cache/terminalOutputs
          if-no-files-found: ignore

  test:
    name: "Test (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Test"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=test --all --parallel

      - name: "Affected: Test"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=test --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  test-integration:
    name: "Integration Test (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2.82.0
        with:
          tool: sqlx-cli

      - name: "Full Run: Integration Test"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=test-integration --all --parallel=1 --outputStyle=static

      - name: "Affected: Integration Test"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=test-integration --base=$BASE --head=$HEAD --parallel=1 --outputStyle=static

      - name: Tear down isolated integration infra
        if: always()
        run: npx nx run infra:stop-integration:test-integration --outputStyle=static || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: integration-test-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  e2e:
    name: "Full-System E2E (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2.82.0
        with:
          tool: sqlx-cli

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: "Full Run: E2E"
        if: needs.prepare.outputs.run_all == 'true'
        run: npx nx run trading-bot-e2e:e2e --outputStyle=static

      - name: "Affected: E2E"
        if: needs.prepare.outputs.run_all != 'true'
        run: npx nx affected --target=e2e --base=$BASE --head=$HEAD --parallel=1 --outputStyle=static

      - name: Tear down full-system e2e infra
        if: always()
        run: npx nx run infra:clean-e2e:e2e --outputStyle=static || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: full-system-e2e-artifacts
          path: |
            .nx/cache/terminalOutputs
            dist/.playwright/apps/trading-bot-e2e
          if-no-files-found: ignore

  build:
    name: "Build (PR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Build"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=build --all --parallel

      - name: "Affected: Build"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=build --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore
