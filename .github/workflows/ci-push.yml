name: "CI — Push"

on:
  push:
    # Keep CI on main, and also run on Renovate branches so branch-style automerge waits for checks
    branches:
      - "main"
      - "renovate/**"

concurrency:
  # Cancel older runs for the same branch; separated from PR workflow so events don't cancel each other
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      base: ${{ steps.vars.outputs.base }}
      head: ${{ steps.vars.outputs.head }}
      run_all: ${{ steps.detect.outputs.run_all }}
      run_all_rust: ${{ steps.detect.outputs.run_all_rust }}
      skip: ${{ steps.skip_push.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Check for existing PR (skip redundant push run)
        id: skip_push
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const ref = context.ref.replace('refs/heads/', '');
            if (ref === 'main') {
              core.setOutput('skip', 'false');
              return;
            }
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${ref}`,
              state: 'open',
            });
            const hasPr = prs.length > 0;
            core.setOutput('skip', hasPr ? 'true' : 'false');
            core.info(hasPr
              ? `Open PR detected for ${ref}; skipping this push run in favor of the PR workflow.`
              : `No open PR detected for ${ref}; continuing push workflow.`);

      - name: Setup Node.js
        if: steps.skip_push.outputs.skip != 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Nx
        if: steps.skip_push.outputs.skip != 'true'
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Determine base and head shas
        id: vars
        if: steps.skip_push.outputs.skip != 'true'
        run: |
          # Push events: use github.event.before only if it's a real SHA that still exists in the repo
          # (force-pushed branches like Renovate rebases will have orphaned SHAs that no longer exist)
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
          else
            git fetch origin ${{ github.event.repository.default_branch }} --depth=1 || true
            echo "base=origin/${{ github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
          fi
          echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Detect package/lockfile changes
        id: detect
        if: steps.skip_push.outputs.skip != 'true'
        env:
          BASE: ${{ steps.vars.outputs.base }}
          HEAD: ${{ steps.vars.outputs.head }}
        run: |
          changed_files=$(git diff --name-only "$BASE" "$HEAD" || true)
          echo "Changed files:\n$changed_files"
          if echo "$changed_files" | grep -E '(^|/)package(-lock)?\.json$|.nvmrc|(^|/)pyproject\.toml$|(^|/)uv\.lock$|(^|/)uv\.toml$' >/dev/null; then
            echo "run_all=true" >> $GITHUB_OUTPUT
          else
            echo "run_all=false" >> $GITHUB_OUTPUT
          fi
          if echo "$changed_files" | grep -E '(^|/)(Cargo\.lock|Cargo\.toml)$' >/dev/null; then
            echo "run_all_rust=true" >> $GITHUB_OUTPUT
          else
            echo "run_all_rust=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.skip_push.outputs.skip != 'true'
        run: npm ci

      - name: Cache node_modules
        if: steps.skip_push.outputs.skip != 'true'
        uses: actions/cache@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Exit early for redundant push run
        if: steps.skip_push.outputs.skip == 'true'
        run: exit 0

  lint:
    name: "Lint (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Lint"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=lint --all --parallel

      - name: "Affected: Lint"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=lint --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lint-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  typecheck:
    name: "Typecheck (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: "Full Run: Typecheck"
        if: needs.prepare.outputs.run_all == 'true'
        run: npx nx run-many --target=typecheck --all --parallel --outputStyle=static

      - name: "Affected: Typecheck"
        if: needs.prepare.outputs.run_all != 'true'
        run: npx nx affected --target=typecheck --base=$BASE --head=$HEAD --parallel --outputStyle=static

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: typecheck-logs
          path: |
            .nx/cache/terminalOutputs
          if-no-files-found: ignore

  test:
    name: "Test (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Test"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=test --all --parallel

      - name: "Affected: Test"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=test --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  test-integration:
    name: "Integration Test (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2.82.0
        with:
          tool: sqlx-cli

      - name: "Full Run: Integration Test"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=test-integration --all --parallel=1 --outputStyle=static

      - name: "Affected: Integration Test"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=test-integration --base=$BASE --head=$HEAD --parallel=1 --outputStyle=static

      - name: Tear down isolated integration infra
        if: always()
        run: npx nx run infra:stop-integration:test-integration --outputStyle=static || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: integration-test-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore

  e2e:
    name: "Full-System E2E (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2.82.0
        with:
          tool: sqlx-cli

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: "Full Run: E2E"
        if: needs.prepare.outputs.run_all == 'true'
        run: npx nx run trading-bot-e2e:e2e --outputStyle=static

      - name: "Affected: E2E"
        if: needs.prepare.outputs.run_all != 'true'
        run: npx nx affected --target=e2e --base=$BASE --head=$HEAD --parallel=1 --outputStyle=static

      - name: Tear down full-system e2e infra
        if: always()
        run: npx nx run infra:clean-e2e:e2e --outputStyle=static || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: full-system-e2e-artifacts
          path: |
            .nx/cache/terminalOutputs
            dist/.playwright/apps/trading-bot-e2e
          if-no-files-found: ignore

  build:
    name: "Build (Push)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.run_all != ''
    env:
      BASE: ${{ needs.prepare.outputs.base }}
      HEAD: ${{ needs.prepare.outputs.head }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache Nx
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/nx
          key: nx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore node_modules
        id: nm-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            node_modules
            apps/*/src/prisma/generated
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'apps/**/prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsasl2-dev protobuf-compiler libcurl4-openssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: "rust"

      - name: "Full Run: Build"
        if: needs.prepare.outputs.run_all == 'true' || needs.prepare.outputs.run_all_rust == 'true'
        run: npx nx run-many --target=build --all --parallel

      - name: "Affected: Build"
        if: needs.prepare.outputs.run_all != 'true' && needs.prepare.outputs.run_all_rust != 'true'
        run: npx nx affected --target=build --base=$BASE --head=$HEAD --parallel

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-logs
          path: |
            .nx/cache/terminalOutputs
            **/junit*.xml
            **/test-results/**/*.xml
          if-no-files-found: ignore
