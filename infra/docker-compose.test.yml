name: ${COMPOSE_PROJECT:-tb-trading-bot-test}

x-redpanda-test-command: &redpanda-test-command
  - redpanda
  - start
  - --overprovisioned
  - --smp
  - '1'
  - --memory
  - 1G
  - --reserve-memory
  - 0M
  - --node-id
  - '0'
  - '--kafka-addr=PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092'
  - '--advertise-kafka-addr=PLAINTEXT://${KAFKA_HOST:-127.0.0.1}:${KAFKA_PORT:-19092},INTERNAL://redpanda:29092'

services:
  redpanda:
    extends:
      file: docker-compose.base.yml
      service: redpanda
    command: *redpanda-test-command
    ports:
      - '${KAFKA_HOST:-127.0.0.1}:${KAFKA_PORT:-19092}:9092'

  redpanda-init:
    extends:
      file: docker-compose.base.yml
      service: redpanda-init

  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres
    ports:
      - '${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-15432}:5432'
